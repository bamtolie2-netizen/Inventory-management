<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>판매관리 — 재고&단가 관리</title>
<link rel="stylesheet" href="shared.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script src="auth.js"></script>
<style>
/* ── 채널 블록 ── */
.ch-block{border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px}
.ch-block-hd{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg);cursor:pointer;user-select:none;transition:background .15s}
.ch-block-hd:hover{background:var(--bg2)}
.ch-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ch-name{font-size:13px;font-weight:600;flex:1}
.ch-stat{font-size:12px;color:var(--text3);font-family:var(--mono)}
.ch-arr{font-size:11px;color:var(--text3);transition:transform .2s}
.ch-body{display:none;padding:10px 14px;border-top:1px solid var(--border);background:var(--surface)}
.ch-body.open{display:block}

/* ── 주문자 블록 ── */
.buyer-block{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;background:var(--surface)}
.buyer-block.saved-block{border-color:var(--green-bd);background:var(--green-bg)}
.buyer-block-hd{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-bottom:1px solid var(--border)}
.buyer-block.saved-block .buyer-block-hd{background:var(--green-bg)}
.buyer-name-inp{font-size:13px;font-weight:600;padding:4px 8px;border:1px solid var(--border2);border-radius:6px;background:var(--surface);color:var(--text1);width:130px;flex-shrink:0}
.buyer-name-inp:focus{outline:none;border-color:var(--accent)}
.buyer-name-inp.saved{border-color:var(--green-bd);background:var(--green-bg)}
.buyer-items{padding:8px 10px}
/* 품목 행 */
.item-row{display:grid;grid-template-columns:1fr 58px 1fr 24px;gap:5px;align-items:center;margin-bottom:5px}
.item-row input{font-size:12.5px;padding:5px 8px;border:1px solid var(--border2);border-radius:6px;background:var(--surface);color:var(--text1);width:100%}
.item-row input:focus{outline:none;border-color:var(--accent)}
.item-row input.saved{border-color:var(--green-bd);background:var(--green-bg)}
.add-item-btn{font-size:11px;padding:3px 8px;border:1px dashed var(--border2);border-radius:5px;cursor:pointer;background:none;color:var(--text3);margin-top:2px;display:inline-flex;align-items:center;gap:3px}
.add-item-btn:hover{background:var(--bg);color:var(--accent);border-color:var(--accent)}
.add-row-btn{font-size:11.5px;padding:4px 10px;border:1px dashed var(--border2);border-radius:6px;cursor:pointer;background:none;color:var(--text3);margin-top:4px}
.add-row-btn:hover{background:var(--bg);color:var(--text1)}
.del-btn{width:22px;height:22px;border:none;background:none;cursor:pointer;color:var(--text3);font-size:15px;display:flex;align-items:center;justify-content:center;border-radius:4px;flex-shrink:0}
.del-btn:hover{background:var(--red-bg);color:var(--red)}
.save-ch-btn{font-size:11.5px;padding:5px 12px;border:1px solid var(--green-bd);border-radius:6px;cursor:pointer;background:var(--green-bg);color:var(--green);margin-top:6px;font-weight:500}
.save-ch-btn:hover{background:#dcfce7}

/* ── 이력 테이블 ── */
.hist-date-group{margin-bottom:16px}
.hist-date-label{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;padding:6px 0;border-bottom:1px solid var(--border);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.hist-date-badge{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--bg2);color:var(--text2);font-weight:500}

/* ── 구매자 카드 ── */
.buyer-card{border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .15s}
.buyer-card:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.buyer-card.open{border-color:var(--accent);background:var(--accent-bg)}
.buyer-name{font-size:14px;font-weight:600}
.buyer-meta{font-size:12px;color:var(--text3);margin-top:3px}
.buyer-detail{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.buyer-detail.open{display:block}

/* ── 통계 칩 ── */
.stat-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.stat-chip{font-size:12px;padding:4px 10px;border-radius:20px;background:var(--bg2);color:var(--text2);border:1px solid var(--border)}

/* ── 상단 요약 ── */
.today-summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:16px}
@media(max-width:700px){.today-summary{grid-template-columns:1fr 1fr}}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.sum-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.sum-val{font-size:22px;font-weight:700;letter-spacing:-1px}
.sum-note{font-size:11px;color:var(--text3);margin-top:3px}

/* ── 검색 강조 ── */
.highlight{background:#FEF9C3;border-radius:2px}

/* ── 품목 자동완성 콤보 ── */
.product-combo input{width:100%;box-sizing:border-box}
.product-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border2);border-radius:6px;box-shadow:0 4px 20px rgba(0,0,0,.18);z-index:9999;display:none;min-width:220px}
.product-dropdown.show{display:block}
.product-combo{position:relative;flex:1}
.product-dropdown-item{padding:7px 10px;font-size:12.5px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.product-dropdown-item:last-child{border-bottom:none}
.product-dropdown-item:hover,.product-dropdown-item.focused{background:var(--accent-bg);color:var(--accent)}
.product-dropdown-item mark{background:#FEF9C3;border-radius:2px;color:inherit;font-weight:600}
.product-dropdown-item .prod-sub{font-size:11px;color:var(--text3);margin-top:1px}

/* ── 실시간 보고서 패널 ── *//* ── 실시간 보고서 패널 ── */
.input-layout{display:grid;grid-template-columns:1fr 300px;gap:16px;align-items:start}
@media(max-width:960px){.input-layout{grid-template-columns:1fr}}
.report-panel{position:sticky;top:calc(var(--top-h) + 16px)}
.report-type-btns{display:flex;gap:6px;margin-bottom:10px}
.rtype-btn{flex:1;font-size:12px;font-weight:600;padding:7px 10px;border:1.5px solid var(--border2);border-radius:8px;cursor:pointer;background:var(--surface);color:var(--text2);transition:all .15s;text-align:center}
.rtype-btn.active{background:var(--text1);color:#fff;border-color:var(--text1)}
.report-preview{font-family:var(--mono);font-size:12.5px;line-height:1.9;padding:14px 15px;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius);min-height:180px;white-space:pre-wrap;word-break:break-all;color:var(--text1);max-height:500px;overflow-y:auto}
.report-empty{color:var(--text3);font-size:12px;font-style:italic}
.copy-flash{animation:flashBtn .4s ease}
@keyframes flashBtn{0%,100%{transform:scale(1)}50%{transform:scale(.95)}}
</style>
</head>
<body>
<nav class="topbar">
  <a href="index.html" class="logo">재고<em>&</em>단가</a>
      <div class="nav-links">
    <a href="index.html"     class="nav-link">대시보드</a>
    <a href="price.html"     class="nav-link">단가표</a>

<script>
(function(){
  var cur = location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('.nav-link').forEach(function(a){
    if(a.getAttribute('href') === cur) a.classList.add('active');
  });
})();
</script>
<div id="loading-bar"></div>
<div class="toast" id="toast"></div>

<div class="page"><div class="page-inner">
  <div style="display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:20px">
    <div>
      <div class="page-title">판매관리</div>
      <div class="page-sub">채널별 주문 입력 · 판매 이력 조회 · 구매자 통계</div>
    </div>
    <div style="display:flex;gap:8px">
      <input type="date" id="work-date" style="font-size:13px;padding:7px 10px">
      <select id="report-type-sel" style="font-size:13px;padding:7px 10px">
        <option value="morning">출근 보고</option>
        <option value="evening">퇴근 보고</option>
      </select>
    </div>
  </div>

  <!-- 오늘 요약 -->
  <div class="today-summary" id="today-summary"></div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('input',this)">판매 입력</div>
    <div class="tab" onclick="switchTab('history',this)">판매 이력</div>
    <div class="tab" onclick="switchTab('buyer',this)">구매자 조회</div>
  </div>

  <!-- ═══ 판매 입력 ═══ -->
  <div id="pane-input">
    <div class="input-layout">

      <!-- 왼쪽: 채널 입력 -->
      <div>
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
          <span style="font-size:13px;color:var(--text2)">채널을 펼쳐서 주문 내역을 입력하세요.</span>
          <button class="btn btn-sm btn-primary" style="margin-left:auto" onclick="saveAll()">전체 저장</button>
        </div>
        <div id="input-channels"></div>
      </div>

      <!-- 오른쪽: 실시간 보고서 -->
      <div class="report-panel">
        <div class="card">
          <div class="card-body">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
              <div style="font-size:13px;font-weight:700">보고서 미리보기</div>
              <button class="btn btn-sm btn-primary" id="copy-report-btn" onclick="copyLiveReport()">복사</button>
            </div>
            <!-- 출근/퇴근 전환 -->
            <div class="report-type-btns">
              <div class="rtype-btn active" id="rtype-morning" onclick="setReportType('morning',this)">출근 보고</div>
              <div class="rtype-btn" id="rtype-evening" onclick="setReportType('evening',this)">퇴근 보고</div>
            </div>
            <div class="report-preview" id="live-report"><span class="report-empty">채널에 주문 내역을 입력하면
자동으로 보고서가 생성됩니다.</span></div>
            <div style="margin-top:8px;font-size:11px;color:var(--text3)">저장 전에도 미리보기 가능 · 저장 후 보고서 페이지에서도 불러오기 가능</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ 판매 이력 ═══ -->
  <div id="pane-history" style="display:none">
    <div class="filters">
      <input type="text" id="hist-buyer" placeholder="구매자 이름 검색..." style="max-width:180px" oninput="searchHistory()">
      <select id="hist-channel" onchange="searchHistory()">
        <option value="">전체 채널</option>
      </select>
      <input type="date" id="hist-from" onchange="searchHistory()">
      <span style="font-size:13px;color:var(--text3)">~</span>
      <input type="date" id="hist-to" onchange="searchHistory()">
      <button class="btn btn-sm" onclick="clearHistFilter()">초기화</button>
      <div style="margin-left:auto;display:flex;gap:6px">
        <span style="font-size:12px;color:var(--text3);align-self:center" id="hist-result-count"></span>
        <button class="btn btn-sm btn-danger" id="hist-del-sel-btn" style="display:none" onclick="deleteSelectedHist()">선택 삭제</button>
        <button class="btn btn-sm btn-danger" onclick="deleteAllVisible()">전체 삭제</button>
      </div>
    </div>

    <!-- Bulk bar -->
    <div class="bulk-bar" id="hist-bulk-bar">
      <span class="count" id="hist-bulk-count">0개 선택</span>
      <button class="btn-bulk danger" onclick="deleteSelectedHist()">선택 삭제</button>
      <button class="btn-bulk" onclick="clearHistSel()" style="margin-left:auto">선택 해제</button>
    </div>

    <div id="history-list"></div>
  </div>

  <!-- ═══ 구매자 조회 ═══ -->
  <div id="pane-buyer" style="display:none">
    <div class="filters">
      <input type="text" id="buyer-search" placeholder="구매자 이름 검색..." style="max-width:220px" oninput="searchBuyer()">
      <select id="buyer-channel-filter" onchange="searchBuyer()">
        <option value="">전체 채널</option>
      </select>
      <span style="font-size:12px;color:var(--text3);margin-left:4px" id="buyer-result-count"></span>
    </div>
    <div id="buyer-list"></div>
  </div>

</div></div>

<script>
(function tick(){document.getElementById('clock').textContent=new Date().toLocaleString('ko-KR',{month:'short',day:'numeric',weekday:'short',hour:'2-digit',minute:'2-digit'});setTimeout(tick,30000);})();

const TODAY = new Date().toISOString().slice(0,10);
document.getElementById('work-date').value = TODAY;

// 날짜가 바뀌면 입력 탭 재렌더
document.getElementById('work-date').addEventListener('change', () => { renderInputChannels(); updateLiveReport(); });
document.getElementById('report-type-sel').addEventListener('change', function() {
  liveReportType = this.value;
  document.querySelectorAll('.rtype-btn').forEach(b => b.classList.remove('active'));
  const activeBtn = document.getElementById('rtype-'+this.value);
  if (activeBtn) activeBtn.classList.add('active');
  renderInputChannels();
});

// inputData: { chKey: [ {buyerTid, name, items:[{itemTid,product,qty,note,savedId}], savedIds:[]} ] }
const inputData = {};
CHANNELS.forEach(ch => { inputData[ch.key] = []; });
let tempId = 0;

const histSel = new Set();
let histRows = []; // 현재 로드된 이력
let allBuyerData = [];

function lb(on){const b=document.getElementById('loading-bar');if(on){b.style.width='60%';b.style.opacity='1';}else{b.style.width='100%';setTimeout(()=>{b.classList.add('done');setTimeout(()=>{b.style.width='0%';b.classList.remove('done');},300);},200);}};

// ──────────────────────────────────────────────
// TAB
// ──────────────────────────────────────────────
function switchTab(id, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  ['input','history','buyer'].forEach(p => {
    document.getElementById('pane-'+p).style.display = p===id ? 'block' : 'none';
  });
  if (id === 'history') loadHistory();
  if (id === 'buyer')   loadBuyers();
}

// ──────────────────────────────────────────────
// 오늘 요약
// ──────────────────────────────────────────────
async function loadSummary() {
  const date = document.getElementById('work-date').value || TODAY;
  const rows = await getSales({ date });
  const totalQty = rows.reduce((a,r) => a + r.quantity, 0);
  const buyers = new Set(rows.map(r => r.buyer_name).filter(Boolean));
  const channels = new Set(rows.map(r => r.channel));
  document.getElementById('today-summary').innerHTML = `
    <div class="sum-card"><div class="sum-label">총 주문 건수</div><div class="sum-val">${rows.length}</div><div class="sum-note">${date} 기준</div></div>
    <div class="sum-card"><div class="sum-label">총 판매 수량</div><div class="sum-val">${totalQty}</div><div class="sum-note">개</div></div>
    <div class="sum-card"><div class="sum-label">구매자 수</div><div class="sum-val">${buyers.size}</div><div class="sum-note">명</div></div>
    <div class="sum-card"><div class="sum-label">활성 채널</div><div class="sum-val">${channels.size}</div><div class="sum-note">/ ${CHANNELS.length}개</div></div>
  `;
}

// ──────────────────────────────────────────────
// 판매 입력
// ──────────────────────────────────────────────
function renderInputChannels() {
  const el = document.getElementById('input-channels');
  el.innerHTML = CHANNELS.map(ch => {
    const buyers = inputData[ch.key];
    const total = buyers.reduce((a,b) => a + b.items.reduce((s,i) => s+(parseInt(i.qty)||0), 0), 0);
    const stat = total ? `${total}개 입력` : '입력없음';
    return `<div class="ch-block" id="chb-${ch.key}">
      <div class="ch-block-hd" onclick="toggleCh('${ch.key}')">
        <div class="ch-dot" style="background:${ch.color}"></div>
        <div class="ch-name">${ch.label}</div>
        <div class="ch-stat" id="chstat-${ch.key}">${stat}</div>
        <div class="ch-arr" id="charr-${ch.key}">▼</div>
      </div>
      <div class="ch-body" id="chbody-${ch.key}">
        <div style="display:grid;grid-template-columns:1fr 58px 1fr 24px;gap:5px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;padding:2px 10px 4px;margin-bottom:4px;background:var(--bg);border-radius:4px">
          <span>품목명</span><span style="text-align:right">수량</span><span>비고</span><span></span>
        </div>
        <div id="chrows-${ch.key}">
          ${buyers.map(b => buyerBlockHTML(ch.key, b)).join('')}
        </div>
        <button class="add-row-btn" onclick="addBuyer('${ch.key}')">+ 주문자 추가</button>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="save-ch-btn" onclick="saveCh('${ch.key}')">이 채널 저장</button>
          <button class="btn btn-sm btn-danger" onclick="clearCh('${ch.key}')" style="font-size:11px">초기화</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function buyerBlockHTML(chKey, b) {
  const allSaved = b.items.length > 0 && b.items.every(i => i.savedId);
  return `<div class="buyer-block ${allSaved?'saved-block':''}" id="buyer-${b.buyerTid}">
    <div class="buyer-block-hd">
      <input class="buyer-name-inp ${allSaved?'saved':''}" placeholder="구매자 이름"
        value="${b.name||''}"
        oninput="setBuyerName('${chKey}',${b.buyerTid},this.value)">
      <span style="font-size:11px;color:var(--text3);margin-left:4px;flex:1">
        ${b.items.length}품목 · ${b.items.reduce((a,i)=>a+(parseInt(i.qty)||0),0)}개
      </span>
      <button class="del-btn" style="font-size:13px" onclick="delBuyer('${chKey}',${b.buyerTid})" title="구매자 삭제">×</button>
    </div>
    <div class="buyer-items">
      <div style="display:grid;grid-template-columns:1fr 58px 1fr 24px;gap:5px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px;padding:0 2px">
        <span>품목명</span><span style="text-align:right">수량</span><span>비고</span><span></span>
      </div>
      <div id="items-${b.buyerTid}">
        ${b.items.map(item => itemRowHTML(chKey, b.buyerTid, item)).join('')}
      </div>
      <button class="add-item-btn" onclick="addItem('${chKey}',${b.buyerTid})">＋ 품목 추가</button>
    </div>
  </div>`;
}

function itemRowHTML(chKey, buyerTid, item) {
  const cls = item.savedId ? 'saved' : '';
  const tid = item.itemTid;
  return `<div class="item-row" id="item-${tid}">
    <div class="product-combo">
      <input id="prod-inp-${tid}" placeholder="품목명 입력 또는 선택" value="${(item.product||'').replace(/"/g,'&quot;')}" class="${cls}"
        autocomplete="off"
        oninput="onProdInput('${chKey}',${buyerTid},${tid},this.value)"
        onkeydown="onProdKeydown(event,'${chKey}',${buyerTid},${tid})"
        onfocus="showProdDropdown('${chKey}',${buyerTid},${tid},this.value)"
        onblur="hideProdDropdown(${tid})">
      <div class="product-dropdown" id="prod-dd-${tid}"></div>
    </div>
    <input id="prod-qty-${tid}" type="number" placeholder="0" min="0" value="${item.qty||''}" class="${cls}"
      style="text-align:right" oninput="setItem('${chKey}',${buyerTid},${tid},'qty',this.value)">
    <input placeholder="비고" value="${(item.note||'').replace(/"/g,'&quot;')}" class="${cls}"
      oninput="setItem('${chKey}',${buyerTid},${tid},'note',this.value)">

function delItem(chKey, buyerTid, itemTid) {

let allProducts = []; // 전체 품목 캐시
let ddFocusIdx = {}; // 드롭다운 포커스 인덱스 { tid: n }

async function loadProductsForCombo() {
  if (allProducts.length) return;
  const prods = await getProductsWithPrices();
  allProducts = prods.map(p => ({ name: p.name, cat: p.category, unit: p.unit, cost: p.cost }));
}

function filterProducts(q) {
  if (!q) return allProducts.slice(0, 6);
  const lq = q.toLowerCase();
  return allProducts.filter(p => p.name.toLowerCase().includes(lq)).slice(0, 6);
}

function showProdDropdown(chKey, buyerTid, tid, val) {
  renderProdDropdown(chKey, buyerTid, tid, val);
}



function hideProdDropdown(tid) {
  // 약간 딜레이 - 클릭 이벤트가 먼저 처리되도록
  setTimeout(() => {
    const dd = document.getElementById('prod-dd-'+tid);

  }, 180);
}

function onProdInput(chKey, buyerTid, tid, val) {
  setItem(chKey, buyerTid, tid, 'product', val);
  renderProdDropdown(chKey, buyerTid, tid, val);
}

function renderProdDropdown(chKey, buyerTid, tid, val) {
  const dd = document.getElementById('prod-dd-'+tid);
  if (!dd) return;
  const filtered = filterProducts(val);
  if (!filtered.length) { dd.classList.remove('show'); return; }

  const q = (val||'').toLowerCase();
  dd.innerHTML = filtered.map((p, i) => {
    const nameHL = q ? p.name.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),
      m => `<mark>${m}</mark>`) : p.name;
    const unitPrice = p.unit > 1 ? Math.round(p.cost/p.unit) : p.cost;
    return `<div class="product-dropdown-item" data-idx="${i}"
      onmousedown="selectProduct('${chKey}',${buyerTid},${tid},'${p.name.replace(/'/g,"\'")}',${unitPrice})"
      onmouseover="setDdFocus(${tid},${i})">
      <div>${nameHL}</div>
      <div class="prod-sub">${p.cat} · 원가 ${unitPrice.toLocaleString()}원</div>
    </div>`;
  }).join('');

  ddFocusIdx[tid] = -1;
  dd.classList.add('show');

}

function setDdFocus(tid, idx) {
  ddFocusIdx[tid] = idx;
  document.querySelectorAll(`#prod-dd-${tid} .product-dropdown-item`).forEach((el, i) => {
    el.classList.toggle('focused', i === idx);
  });
}

function selectProduct(chKey, buyerTid, tid, name, unitPrice) {
  const inp = document.getElementById('prod-inp-'+tid);
  if (inp) inp.value = name;
  setItem(chKey, buyerTid, tid, 'product', name);
  // 수량 입력으로 포커스 이동
  setTimeout(() => {
    const qtyInp = document.getElementById('prod-qty-'+tid);
    if (qtyInp) { qtyInp.focus(); qtyInp.select(); }
  }, 50);
  const dd = document.getElementById('prod-dd-'+tid);
  if (dd) dd.classList.remove('show');
}

function onProdKeydown(e, chKey, buyerTid, tid) {
  const dd = document.getElementById('prod-dd-'+tid);
  if (!dd || !dd.classList.contains('show')) return;
  const items = dd.querySelectorAll('.product-dropdown-item');
  let idx = ddFocusIdx[tid] ?? -1;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    idx = Math.min(idx+1, items.length-1);
    setDdFocus(tid, idx);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    idx = Math.max(idx-1, 0);
    setDdFocus(tid, idx);
  } else if (e.key === 'Enter' && idx >= 0) {
    e.preventDefault();
    items[idx]?.dispatchEvent(new MouseEvent('mousedown'));
  } else if (e.key === 'Escape') {
    dd.classList.remove('show');
  }
}

function updateChStat(chKey) {
  const buyers = inputData[chKey];
  const total = buyers.reduce((a,b) => a + b.items.reduce((s,i) => s+(parseInt(i.qty)||0), 0), 0);
  const el = document.getElementById('chstat-'+chKey);
  if (el) el.textContent = total ? `${total}개 입력` : '입력없음';
  updateLiveReport();
}

// ── 실시간 보고서 ───────────────────────────────
let liveReportType = 'morning';

function setReportType(type, el) {
  liveReportType = type;
  document.querySelectorAll('.rtype-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  // report-type-sel 동기화
  const sel = document.getElementById('report-type-sel');
  if (sel) sel.value = type;
  updateLiveReport();
}

function updateLiveReport() {
  const el = document.getElementById('live-report');
  if (!el) return;
  const date = document.getElementById('work-date').value || TODAY;
  const now = new Date();
  const DS = now.toLocaleDateString('ko-KR',{year:'numeric',month:'numeric',day:'numeric',weekday:'short'}).replace(/\. /g,'.').replace('.)',')');

  if (liveReportType === 'morning') {
    // 출근: 채널별 주문자별 상세
    const lines = [];
    let grandTotal = 0;
    CHANNELS.forEach(ch => {
      const buyers = (inputData[ch.key]||[]).filter(b => b.items.some(i => i.product || i.qty));
      if (!buyers.length) return;
      const chTotal = buyers.reduce((a,b) => a + b.items.reduce((s,i) => s+(parseInt(i.qty)||0),0), 0);
      grandTotal += chTotal;
      lines.push(`[${ch.label}]`);
      buyers.forEach(b => {
        b.items.filter(i => i.product || i.qty).forEach(item => {
          let line = `${b.name||'(이름없음)'} - ${item.product||'(품목없음)'}`;
          if (item.qty) line += ` / ${item.qty}개`;
          if (item.note) line += ` (${item.note})`;
          lines.push(line);
        });
      });
    });
    if (!lines.length) {
      el.innerHTML = '<span class="report-empty">입력된 주문이 없습니다.</span>';
      return;
    }
    el.textContent = `${DS}
주문 현황 (총 ${grandTotal}건)

${lines.join('\n')}`;
  } else {
    // 퇴근: 품목별 합산
    const byProduct = {};
    CHANNELS.forEach(ch => {
      (inputData[ch.key]||[]).forEach(b => {
        b.items.filter(i => i.product).forEach(item => {
          const key = item.product;
          if (!byProduct[key]) byProduct[key] = { qty:0, notes:[] };
          byProduct[key].qty += parseInt(item.qty)||0;
          if (item.note) byProduct[key].notes.push(item.note);
        });
      });
    });
    const entries = Object.entries(byProduct).filter(([,v]) => v.qty > 0);
    if (!entries.length) {
      el.innerHTML = '<span class="report-empty">입력된 주문이 없습니다.</span>';
      return;
    }
    const lines = entries.map(([name, d]) => {
      let line = `${name} : ${d.qty}개`;
      if (d.notes.length) line += ` (${d.notes.join(', ')})`;
      return line;
    });
    el.textContent = `${DS}

${lines.join('\n')}`;
  }
}

function copyLiveReport() {
  const el = document.getElementById('live-report');
  if (!el || !el.textContent || el.querySelector('.report-empty')) {
    showToast('보고서 내용이 없습니다', 'error'); return;
  }
  navigator.clipboard.writeText(el.textContent).then(() => {
    const btn = document.getElementById('copy-report-btn');
    const orig = btn.textContent;
    btn.textContent = '복사됨!'; btn.classList.add('copy-flash');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copy-flash'); }, 1800);
  }).catch(() => showToast('복사 실패', 'error'));
}

async function saveCh(chKey) {
  const date = document.getElementById('work-date').value || TODAY;
  const repType = document.getElementById('report-type-sel').value;
  // 미저장 품목 수집
  const toInsert = [];
  const unsavedItems = []; // { buyer, item } 참조
  inputData[chKey].forEach(buyer => {
    buyer.items.forEach(item => {
      if (item.product && !item.savedId) {
        toInsert.push({
          channel: chKey,
          buyer_name: buyer.name || '',
          product_name: item.product,
          quantity: parseInt(item.qty) || 1,
          note: item.note || '',
          report_type: repType,
          date,
          sold_at: new Date().toISOString(),
        });
        unsavedItems.push({ buyer, item });
      }
    });
  });
  if (!toInsert.length) { showToast('저장할 새 항목이 없습니다', 'error'); return; }
  lb(true);
  const saved = await addSalesBatch(toInsert);
  lb(false);
  if (saved) {
    // savedId 매핑
    saved.forEach((s, i) => {
      unsavedItems[i].item.savedId = s.id;
      // UI 업데이트
      document.querySelectorAll(`#item-${unsavedItems[i].item.itemTid} input`).forEach(el => el.classList.add('saved'));
    });
    // 구매자 블록 헤더 갱신
    inputData[chKey].forEach(b => refreshBuyerHeader(chKey, b.buyerTid));
    showToast(`${saved.length}건 저장됨`);
    await loadSummary();
  }
}

async function saveAll() {
  let total = 0;
  const date = document.getElementById('work-date').value || TODAY;
  const repType = document.getElementById('report-type-sel').value;
  for (const ch of CHANNELS) {
    const toInsert = [];
    const unsaved = [];
    inputData[ch.key].forEach(buyer => {
      buyer.items.forEach(item => {
        if (item.product && !item.savedId) {
          toInsert.push({ channel:ch.key, buyer_name:buyer.name||'', product_name:item.product,
            quantity:parseInt(item.qty)||1, note:item.note||'', report_type:repType, date, sold_at:new Date().toISOString() });
          unsaved.push({ buyer, item });
        }
      });
    });
    if (!toInsert.length) continue;
    lb(true);
    const saved = await addSalesBatch(toInsert);
    lb(false);

      saved.forEach((s,i) => {

  else showToast('저장할 새 항목이 없습니다', 'error');

function renderHistory() {
  const list = document.getElementById('history-list');
  const cnt  = document.getElementById('hist-result-count');
  if (cnt) cnt.textContent = `${histRows.length}건`;
  if (!histRows.length) { list.innerHTML = '<div class="empty">조회된 판매 내역이 없습니다.</div>'; return; }

  // 날짜별 그룹

    grouped[r.date].push(r);
  });

  const buyer = document.getElementById('hist-buyer').value.trim();

  list.innerHTML = Object.entries(grouped).sort(([a],[b]) => b.localeCompare(a)).map(([date, rows]) => {
    const dayTotal = rows.reduce((a,r) => a+r.quantity, 0);
    const rowsHTML = rows.map(r => {
      const ch = CHANNELS.find(c => c.key === r.channel);
      const nameHL = buyer && r.buyer_name ? r.buyer_name.replace(new RegExp(buyer,'gi'), m => `<mark class="highlight">${m}</mark>`) : (r.buyer_name||'-');

        <td><span style="display:inline-flex;align-items:center;gap:5px"><span style="width:6px;height:6px;border-radius:50%;background:${ch?.color||'#888'};display:inline-block"></span>${ch?.label||r.channel}</span></td>
        <td class="fw-bold">${nameHL}</td>
        <td>${r.product_name}</td>
        <td class="right mono">${r.quantity}개</td>
        <td class="text-muted text-sm">${r.note||'-'}</td>
        <td><span class="badge ${r.report_type==='morning'?'badge-info':'badge-gray'}">${r.report_type==='morning'?'출근':'퇴근'}</span></td>

      <div class="hist-date-label">

          <th style="width:70px">구분</th><th class="right" style="width:55px">삭제</th>
        </tr></thead>
        <tbody>${rowsHTML}</tbody>
      </table></div></div>
    </div>`;
  }).join('');

  updateHistBulkBar();
}

function histToggleDate(date, checked) {
  histRows.filter(r => r.date===date).forEach(r => { if(checked) histSel.add(r.id); else histSel.delete(r.id); });

function updateHistBulkBar() {

function renderBuyers() {
  const q = document.getElementById('buyer-search').value.trim().toLowerCase();
  const chFilter = document.getElementById('buyer-channel-filter').value;
  const cnt = document.getElementById('buyer-result-count');

  // 구매자별 집계
  const byBuyer = {};
  allBuyerData.forEach(r => {
    if (!r.buyer_name) return;
    if (chFilter && r.channel !== chFilter) return;
    if (!byBuyer[r.buyer_name]) byBuyer[r.buyer_name] = { rows:[], totalQty:0, channels:new Set(), dates:[] };
    byBuyer[r.buyer_name].rows.push(r);
    byBuyer[r.buyer_name].totalQty += r.quantity;
    byBuyer[r.buyer_name].channels.add(r.channel);
    byBuyer[r.buyer_name].dates.push(r.date);
  });

  let filtered = Object.entries(byBuyer);
  if (q) filtered = filtered.filter(([name]) => name.toLowerCase().includes(q));
  filtered.sort((a,b) => b[1].totalQty - a[1].totalQty);

  if (cnt) cnt.textContent = `${filtered.length}명`;
  const list = document.getElementById('buyer-list');
  if (!filtered.length) { list.innerHTML = '<div class="empty">조회된 구매자가 없습니다.</div>'; return; }

  list.innerHTML = filtered.map(([name, data]) => {
    const lastDate = data.dates.sort().reverse()[0];
    const firstDate = data.dates.sort()[0];
    const chLabels = [...data.channels].map(k => CHANNELS.find(c=>c.key===k)?.label||k).join(', ');
    const nameHL = q ? name.replace(new RegExp(q,'gi'), m=>`<mark class="highlight">${m}</mark>`) : name;

    // 품목별 집계
    const byProduct = {};
    data.rows.forEach(r => {
      if (!byProduct[r.product_name]) byProduct[r.product_name] = 0;
      byProduct[r.product_name] += r.quantity;
    });

    const detailRows = data.rows.sort((a,b) => b.date.localeCompare(a.date)).map(r => {
      const ch = CHANNELS.find(c=>c.key===r.channel);
      return `<tr>
        <td class="text-muted text-sm">${r.date}</td>
        <td><span style="display:inline-flex;align-items:center;gap:4px"><span style="width:6px;height:6px;border-radius:50%;background:${ch?.color||'#888'};display:inline-block"></span>${ch?.label||r.channel}</span></td>
        <td>${r.product_name}</td>
        <td class="right mono">${r.quantity}개</td>
        <td class="text-muted text-sm">${r.note||'-'}</td>
      </tr>`;
    }).join('');

    return `<div class="buyer-card" onclick="toggleBuyer(this)">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <div style="width:36px;height:36px;border-radius:50%;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--accent);flex-shrink:0">${name.charAt(0)}</div>
        <div style="flex:1">
          <div class="buyer-name">${nameHL}</div>
          <div class="buyer-meta">총 ${data.totalQty}개 구매 · ${data.rows.length}건 · 최근: ${lastDate}</div>
        </div>
        <div class="stat-chips">
          ${[...data.channels].map(k=>{const ch=CHANNELS.find(c=>c.key===k);return`<span class="stat-chip" style="border-color:${ch?.color||'#888'};color:${ch?.color||'#888'}">${ch?.label||k}</span>`;}).join('')}
        </div>
      </div>
      <div class="buyer-detail">
        <div style="display:flex;gap:16px;margin-bottom:10px;font-size:12.5px;flex-wrap:wrap">
          <span style="color:var(--text2)">첫 구매: <strong>${firstDate}</strong></span>
          <span style="color:var(--text2)">최근 구매: <strong>${lastDate}</strong></span>
          <span style="color:var(--text2)">구매 채널: <strong>${chLabels}</strong></span>
        </div>
        <div style="margin-bottom:10px">
          <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">품목별 구매량</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${Object.entries(byProduct).sort((a,b)=>b[1]-a[1]).map(([prod,qty])=>`<span class="badge badge-gray">${prod} <strong>${qty}개</strong></span>`).join('')}
          </div>
        </div>
        <div class="card" style="padding:0"><div class="tbl-wrap"><table>
          <thead><tr><th>날짜</th><th>채널</th><th>품목</th><th class="right">수량</th><th>비고</th></tr></thead>
          <tbody>${detailRows}</tbody>
        </table></div></div>
      </div>
    </div>`;
  }).join('');
}

function toggleBuyer(card) {
  const detail = card.querySelector('.buyer-detail');
  detail.classList.toggle('open');
  card.classList.toggle('open');
}

// ──────────────────────────────────────────────
// 채널 필터 셀렉트 초기화
// ──────────────────────────────────────────────
function initChannelFilters() {
  ['hist-channel','buyer-channel-filter'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    CHANNELS.forEach(ch => {
      const opt = document.createElement('option');
      opt.value = ch.key; opt.textContent = ch.label;
      el.appendChild(opt);
    });
  });
}

// ──────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────
initChannelFilters();
renderInputChannels();
loadSummary();
loadProductsForCombo();
// 스크롤/리사이즈 시 드롭다운 닫기
window.addEventListener('scroll', () => {
  document.querySelectorAll('.product-dropdown.show').forEach(dd => dd.classList.remove('show'));
}, true);
window.addEventListener('resize', () => {
  document.querySelectorAll('.product-dropdown.show').forEach(dd => dd.classList.remove('show'));
});
</script>
</body>
</html>
