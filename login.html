<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 — 재고&단가 관리</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg,#F9FAFB);font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif}
:root{--bg:#F3F4F6;--surface:#FFFFFF;--border:#E5E7EB;--border2:#D1D5DB;--text1:#111827;--text2:#374151;--text3:#9CA3AF;--accent:#2563EB;--accent-bg:#EFF6FF;--red:#DC2626;--red-bg:#FEF2F2;--green:#16A34A;--radius:8px}
@media(prefers-color-scheme:dark){:root{--bg:#111827;--surface:#1F2937;--border:#374151;--border2:#4B5563;--text1:#F9FAFB;--text2:#D1D5DB;--text3:#6B7280;--accent-bg:#1E3A5F}}

.login-wrap{width:100%;max-width:400px;padding:20px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 32px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.login-logo{font-size:20px;font-weight:700;color:var(--text1);margin-bottom:6px;letter-spacing:-0.5px}
.login-logo em{color:var(--accent);font-style:normal}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:28px}
.login-tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:24px}
.login-tab{flex:1;padding:9px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text3);transition:all .15s}
.login-tab.active{background:var(--text1);color:#fff}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
.field input{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--radius);font-size:14px;background:var(--surface);color:var(--text1);outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--accent)}
.btn-login{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;transition:opacity .15s}
.btn-login:hover{opacity:.88}
.btn-login:disabled{opacity:.5;cursor:not-allowed}
.msg{font-size:12.5px;padding:10px 12px;border-radius:var(--radius);margin-top:12px;display:none}
.msg.error{background:var(--red-bg);color:var(--red);border:1px solid #FECACA;display:block}
.msg.success{background:#F0FDF4;color:var(--green);border:1px solid #BBF7D0;display:block}
.divider{display:flex;align-items:center;gap:10px;margin:20px 0;color:var(--text3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.invite-section{display:none}
.invite-section.show{display:block}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">재고<em>&</em>단가 관리</div>
    <div class="login-sub">업무용 재고·단가·판매 통합 관리 시스템</div>

    <!-- 탭 -->
    <div class="login-tabs">
      <button class="login-tab active" id="tab-login" onclick="switchMode('login')">로그인</button>
      <button class="login-tab" id="tab-register" onclick="switchMode('register')">초대 코드로 가입</button>
    </div>

    <!-- 로그인 폼 -->
    <div id="form-login">
      <div class="field">
        <label>이메일</label>
        <input type="email" id="login-email" placeholder="이메일 주소" autocomplete="email">
      </div>
      <div class="field">
        <label>비밀번호</label>
        <input type="password" id="login-pw" placeholder="비밀번호" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn-login" id="btn-login" onclick="doLogin()">로그인</button>
    </div>

    <!-- 가입 폼 -->
    <div id="form-register" style="display:none">
      <div class="field">
        <label>초대 코드 (이메일로 받은 링크의 코드)</label>
        <input type="text" id="reg-token" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
          oninput="checkToken()">
      </div>
      <div id="token-info" style="font-size:12px;color:var(--text3);margin-bottom:12px;min-height:18px"></div>
      <div class="field">
        <label>이름</label>
        <input type="text" id="reg-name" placeholder="이름">
      </div>
      <div class="field">
        <label>이메일</label>
        <input type="email" id="reg-email" placeholder="이메일 주소" readonly
          style="background:var(--bg);color:var(--text3)">
      </div>
      <div class="field">
        <label>비밀번호 설정</label>
        <input type="password" id="reg-pw" placeholder="8자 이상">
      </div>
      <div class="field">
        <label>비밀번호 확인</label>
        <input type="password" id="reg-pw2" placeholder="비밀번호 재입력"
          onkeydown="if(event.key==='Enter')doRegister()">
      </div>
      <button class="btn-login" id="btn-register" onclick="doRegister()" disabled>가입하기</button>
    </div>

    <div class="msg" id="msg"></div>
  </div>

  <div style="text-align:center;margin-top:16px;font-size:12px;color:var(--text3)">
    계정이 없으신가요? MASTER에게 초대를 요청하세요.
  </div>
</div>

<script>
// 이미 로그인 상태 체크 (페이지 숨기고 빠르게 처리)
document.body.style.visibility = 'hidden';
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    location.replace('index.html');
    return;
  }
  // 로그인 안된 상태 → 페이지 표시
  document.body.style.visibility = '';

  // URL 파라미터 처리
  const params = new URLSearchParams(location.search);
  const error = params.get('error');
  if (error === 'inactive') showMsg('비활성화된 계정입니다. 관리자에게 문의하세요.', 'error');

  // 초대 토큰이 URL에 있으면 가입 탭으로
  const token = params.get('token');
  if (token) {
    switchMode('register');
    document.getElementById('reg-token').value = token;
    checkToken();
  }
})();

function switchMode(mode) {
  document.getElementById('form-login').style.display    = mode==='login' ? '' : 'none';
  document.getElementById('form-register').style.display = mode==='register' ? '' : 'none';
  document.getElementById('tab-login').classList.toggle('active', mode==='login');
  document.getElementById('tab-register').classList.toggle('active', mode==='register');
  clearMsg();
}

// ── 로그인 ────────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw    = document.getElementById('login-pw').value;
  if (!email || !pw) { showMsg('이메일과 비밀번호를 입력하세요.', 'error'); return; }

  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = '로그인 중...';

  const { error } = await sb.auth.signInWithPassword({ email, password: pw });
  btn.disabled = false; btn.textContent = '로그인';

  if (error) {
    showMsg('이메일 또는 비밀번호가 올바르지 않습니다.', 'error');
    return;
  }

  // app_users 확인
  const { data: user } = await sb.from('app_users').select('*').eq('email', email).single();
  if (!user) {
    await sb.auth.signOut();
    showMsg('등록되지 않은 계정입니다. MASTER에게 문의하세요.', 'error');
    return;
  }
  if (!user.is_active) {
    await sb.auth.signOut();
    showMsg('비활성화된 계정입니다. 관리자에게 문의하세요.', 'error');
    return;
  }

  // last_login 업데이트
  await sb.from('app_users').update({ last_login: new Date().toISOString() }).eq('email', email);

  location.href = 'index.html';
}

// ── 초대 토큰 확인 ────────────────────────────────────────────
let inviteData = null;
async function checkToken() {
  const token = document.getElementById('reg-token').value.trim();
  const info  = document.getElementById('token-info');
  const btn   = document.getElementById('btn-register');
  inviteData  = null;
  btn.disabled = true;

  if (!token || token.length < 36) { info.textContent = ''; return; }

  const { data } = await sb.from('invitations')
    .select('*').eq('token', token).single();

  if (!data) {
    info.style.color = 'var(--red)';
    info.textContent = '유효하지 않은 초대 코드입니다.';
    return;
  }
  if (data.used_at) {
    info.style.color = 'var(--red)';
    info.textContent = '이미 사용된 초대 코드입니다.';
    return;
  }
  if (new Date(data.expires_at) < new Date()) {
    info.style.color = 'var(--red)';
    info.textContent = '만료된 초대 코드입니다. 새 초대를 요청하세요.';
    return;
  }

  inviteData = data;
  info.style.color = 'var(--green)';
  info.textContent = `초대 확인됨 — ${data.email} (${new Date(data.expires_at).toLocaleDateString('ko-KR')} 까지)`;
  document.getElementById('reg-email').value = data.email;
  btn.disabled = false;
}

// ── 가입 ─────────────────────────────────────────────────────
async function doRegister() {
  if (!inviteData) { showMsg('유효한 초대 코드를 먼저 확인하세요.', 'error'); return; }
  const name  = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pw    = document.getElementById('reg-pw').value;
  const pw2   = document.getElementById('reg-pw2').value;

  if (!name) { showMsg('이름을 입력하세요.', 'error'); return; }
  if (pw.length < 8) { showMsg('비밀번호는 8자 이상이어야 합니다.', 'error'); return; }
  if (pw !== pw2) { showMsg('비밀번호가 일치하지 않습니다.', 'error'); return; }

  const btn = document.getElementById('btn-register');
  btn.disabled = true; btn.textContent = '가입 중...';

  // Supabase Auth 계정 생성
  const { error: signUpErr } = await sb.auth.signUp({ email, password: pw });
  if (signUpErr) {
    btn.disabled = false; btn.textContent = '가입하기';
    showMsg('가입 실패: ' + signUpErr.message, 'error');
    return;
  }

  // app_users 등록
  await sb.from('app_users').upsert({
    email, name, role: 'user',
    invited_by: inviteData.invited_by,
    is_active: true,
  }, { onConflict: 'email' });

  // 초대 토큰 사용 처리
  await sb.from('invitations').update({ used_at: new Date().toISOString() })
    .eq('id', inviteData.id);

  btn.disabled = false; btn.textContent = '가입하기';
  showMsg('가입 완료! 이메일 확인 후 로그인하세요. (이메일 인증 없이 바로 로그인 가능한 경우도 있습니다)', 'success');
  setTimeout(() => switchMode('login'), 3000);
}

function showMsg(txt, type) {
  const el = document.getElementById('msg');
  el.textContent = txt;
  el.className = 'msg ' + type;
}
function clearMsg() {
  const el = document.getElementById('msg');
  el.className = 'msg';
  el.textContent = '';
}
</script>
</body>
</html>
